<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>かんたん家計簿</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif; background: #fff7f5; color: #4a3f3f; padding-bottom: 100px; }
  header { position: sticky; top: 0; z-index: 10; background: linear-gradient(135deg, #ffb3c6, #ff8fab); color: #fff; padding: 14px 16px; display: flex; align-items: center; justify-content: center; gap: 18px; box-shadow: 0 2px 8px rgba(255,143,171,.35); }
  header h1 { font-size: 18px; min-width: 8.5em; text-align: center; font-weight: 700; }
  header button { background: rgba(255,255,255,.25); border: none; color: #fff; width: 34px; height: 34px; border-radius: 50%; font-size: 14px; cursor: pointer; }
  #gear { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); font-size: 16px; }
  main { max-width: 560px; margin: 0 auto; padding: 14px; }
  .card { background: #fff; border-radius: 20px; padding: 16px 18px; margin-bottom: 14px; box-shadow: 0 3px 10px rgba(180,140,140,.10); }
  .label { font-size: 12px; color: #a08c8c; margin-bottom: 4px; }
  .big { font-size: 34px; font-weight: 700; }
  .big.ok { color: #4caf8e; } .big.warn { color: #e8963e; } .big.over { color: #e05d5d; }
  .bar { height: 12px; background: #f4e3e3; border-radius: 6px; overflow: hidden; margin: 10px 0 8px; }
  .bar > div { height: 100%; border-radius: 6px; background: #7fc8a9; transition: width .4s; }
  .bar.warn > div { background: #f5b971; } .bar.over > div { background: #ef8080; }
  .sub { font-size: 12px; color: #a08c8c; display: flex; justify-content: space-between; }
  .perday { margin-top: 10px; font-size: 13px; background: #fff0f3; border-radius: 12px; padding: 8px 12px; color: #d16d88; }
  h2 { font-size: 14px; color: #c98a9c; margin: 4px 2px 8px; }
  .cat { display: flex; align-items: center; gap: 10px; padding: 7px 0; }
  .cat .name { width: 9.2em; font-size: 12px; flex-shrink: 0; white-space: nowrap; }
  .cat .cbar { flex: 1; height: 8px; background: #f4e3e3; border-radius: 4px; overflow: hidden; }
  .cat .cbar > div { height: 100%; border-radius: 4px; transition: width .4s; }
  .cat .num { font-size: 11px; color: #a08c8c; width: 7.8em; text-align: right; flex-shrink: 0; }
  .day { font-size: 12px; color: #c98a9c; font-weight: 700; margin: 14px 4px 5px; }
  /* 円グラフ（今月の内訳） */
  .donutWrap { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  .donutSvg { width: 130px; height: 130px; flex-shrink: 0; }
  .donutCenter { fill: #4a3f3f; font-weight: 700; }
  .donutCenterSub { fill: #a08c8c; }
  .legend { flex: 1; min-width: 140px; }
  .legrow { display: flex; align-items: center; gap: 7px; padding: 3px 0; font-size: 12px; }
  .legdot { width: 11px; height: 11px; border-radius: 3px; flex-shrink: 0; }
  .legname { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .legpct { color: #a08c8c; width: 3.2em; text-align: right; flex-shrink: 0; }
  .legamt { width: 5.2em; text-align: right; flex-shrink: 0; }
  .item { background: #fff; border-radius: 14px; padding: 10px 12px; margin-bottom: 6px; display: flex; align-items: center; gap: 8px; box-shadow: 0 2px 6px rgba(180,140,140,.08); }
  .item .info { flex: 1; min-width: 0; }
  .item .shop { font-size: 14px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item .meta { font-size: 11px; color: #b8a5a5; }
  .item select { border: 1px solid #f0d9dd; background: #fff8fa; border-radius: 8px; font-size: 11px; padding: 3px 2px; color: #c98a9c; max-width: 7.5em; }
  .item .amt { font-size: 15px; font-weight: 700; white-space: nowrap; }
  .item .del { border: none; background: none; color: #d9bcbc; font-size: 15px; cursor: pointer; padding: 4px; }
  #fab { position: fixed; right: 20px; bottom: 24px; width: 58px; height: 58px; border-radius: 50%; border: none; background: linear-gradient(135deg, #ffb3c6, #ff8fab); color: #fff; font-size: 30px; line-height: 1; box-shadow: 0 4px 14px rgba(255,143,171,.5); cursor: pointer; z-index: 20; }
  .overlay { position: fixed; inset: 0; background: rgba(80,60,60,.35); display: none; z-index: 30; }
  .overlay.show { display: block; }
  .sheet { position: fixed; left: 0; right: 0; bottom: 0; background: #fff; border-radius: 24px 24px 0 0; padding: 20px 20px 34px; z-index: 31; max-width: 560px; margin: 0 auto; display: none; }
  .sheet h3 { font-size: 15px; color: #c98a9c; margin-bottom: 14px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #a08c8c; margin-bottom: 4px; }
  .field input, .field select, .field textarea { width: 100%; min-width: 0; max-width: 100%; border: 1.5px solid #f0d9dd; border-radius: 12px; padding: 10px 12px; font-size: 16px; background: #fffafb; color: #4a3f3f; font-family: inherit; }
  .field textarea { resize: vertical; line-height: 1.5; }
  /* iOS Safari の日付入力が枠からはみ出すのを防ぐ */
  .field input[type="date"] { -webkit-appearance: none; appearance: none; }
  .field input[type="date"]::-webkit-date-and-time-value { text-align: left; margin: 0; min-width: 0; }
  .row2 { display: flex; gap: 10px; } .row2 .field { flex: 1 1 0; min-width: 0; }
  .primaryBtn { width: 100%; border: none; border-radius: 14px; padding: 14px; font-size: 16px; font-weight: 700; color: #fff; background: linear-gradient(135deg, #ffb3c6, #ff8fab); margin-top: 4px; cursor: pointer; }
  .primaryBtn:disabled { opacity: .5; }
  .linkBtn { display: block; width: 100%; background: none; border: none; color: #c98a9c; font-size: 13px; margin-top: 16px; cursor: pointer; text-decoration: underline; }
  .setlist { max-height: 52vh; overflow-y: auto; margin-bottom: 14px; }
  .setrow { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 6px 0; }
  .setrow .setname { font-size: 14px; }
  .setrow input { width: 8em; border: 1.5px solid #f0d9dd; border-radius: 12px; padding: 8px 10px; font-size: 16px; text-align: right; background: #fffafb; color: #4a3f3f; }
  .settotal { font-size: 12px; color: #a08c8c; text-align: right; margin: 2px 2px 12px; }
  .empty { text-align: center; color: #b8a5a5; font-size: 13px; padding: 20px 0; }

  /* カテゴリ詳細画面 */
  .cat { cursor: pointer; }
  .cat .name { display: flex; align-items: center; }
  .cat .chev { color: #d9bcbc; font-size: 12px; margin-left: 4px; }
  #detail { position: fixed; inset: 0; background: #fff7f5; z-index: 40; display: none; flex-direction: column; }
  #detail.show { display: flex; }
  .dHead { background: linear-gradient(135deg, #ffb3c6, #ff8fab); color: #fff; padding: 14px 16px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(255,143,171,.35); flex-shrink: 0; }
  .dHead button { background: rgba(255,255,255,.25); border: none; color: #fff; width: 34px; height: 34px; border-radius: 50%; font-size: 15px; cursor: pointer; flex-shrink: 0; }
  .dHead .dTtl { font-size: 16px; font-weight: 700; }
  .dHead .dSub { font-size: 12px; opacity: .9; margin-top: 2px; }
  .dBody { flex: 1; overflow-y: auto; padding: 14px; max-width: 560px; margin: 0 auto; width: 100%; }
  .chartSvg { width: 100%; height: auto; display: block; }
  .dEmpty { text-align: center; color: #b8a5a5; font-size: 13px; padding: 24px 0; }

  /* ログイン画面 */
  #login { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; padding: 24px; background: linear-gradient(160deg, #ffe3ea, #fff7f5); z-index: 50; }
  .logincard { background: #fff; border-radius: 24px; padding: 30px 24px; width: 100%; max-width: 360px; box-shadow: 0 8px 24px rgba(255,143,171,.25); }
  .loginttl { font-size: 20px; font-weight: 700; color: #ff7aa2; text-align: center; margin-bottom: 22px; }
  .loginmsg { font-size: 12px; margin-top: 12px; text-align: center; min-height: 1.2em; color: #e05d5d; }

  /* ログイン状態による表示切替 */
  body:not(.signed-in) header, body:not(.signed-in) main, body:not(.signed-in) #fab { display: none; }
  body:not(.signed-in) #login { display: flex; }
</style>
</head>
<body>
<header>
  <button onclick="moveMonth(-1)">◀</button>
  <h1 id="ymLabel">…</h1>
  <button onclick="moveMonth(1)">▶</button>
  <button id="gear" onclick="openSettings()">⚙️</button>
</header>
<main id="app"></main>
<button id="fab" onclick="openSheet()">＋</button>

<!-- カテゴリ詳細画面 -->
<div id="detail">
  <div class="dHead">
    <button onclick="closeCatDetail()">◀</button>
    <div><div class="dTtl" id="dTtl"></div><div class="dSub" id="dSub"></div></div>
  </div>
  <div class="dBody" id="dBody"></div>
</div>

<!-- ログイン画面 -->
<div id="login">
  <div class="logincard">
    <div class="loginttl">🌸 かんたん家計簿</div>
    <div class="field"><label>メールアドレス</label><input type="email" id="l_email" autocomplete="username" placeholder="you@example.com"></div>
    <div class="field"><label>パスワード</label><input type="password" id="l_pass" autocomplete="current-password" placeholder="パスワード" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="primaryBtn" id="loginBtn" onclick="doLogin()">ログイン</button>
    <div id="l_msg" class="loginmsg"></div>
  </div>
</div>

<!-- 手入力の追加シート -->
<div id="overlay" class="overlay" onclick="closeSheet()"></div>
<div id="sheet" class="sheet">
  <h3>✏️ 手入力で追加</h3>
  <div class="row2">
    <div class="field"><label>金額（円）</label><input type="number" id="f_amount" inputmode="numeric" placeholder="500"></div>
    <div class="field"><label>日付</label><input type="date" id="f_date"></div>
  </div>
  <div class="field"><label>内容・お店</label><input type="text" id="f_shop" placeholder="スーパーで買い物 など"></div>
  <div class="row2">
    <div class="field"><label>カテゴリ</label><select id="f_cat"></select></div>
    <div class="field"><label>支払方法</label><select id="f_pay"><option>現金</option><option>カード</option><option>電子マネー</option><option>その他</option></select></div>
  </div>
  <button class="primaryBtn" id="saveBtn" onclick="save()">追加する</button>
</div>

<!-- 予算の設定シート -->
<div id="setOverlay" class="overlay" onclick="closeSettings()"></div>
<div id="setSheet" class="sheet"></div>

<!-- まとめて取り込みシート -->
<div id="impOverlay" class="overlay" onclick="closeImport()"></div>
<div id="impSheet" class="sheet"></div>

<!-- Supabase のライブラリを読み込み -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  /* ============================================================
     ▼▼▼ Supabase 接続情報（公開キー・安全な値）▼▼▼
     ============================================================ */
  var SB_URL = 'https://fexngnzutsgapjzguqaa.supabase.co';
  var SB_KEY = 'sb_publishable_YURvmJ6zAnnAmHAR9jLCaw_Cyz7i_RS';
  var sb = supabase.createClient(SB_URL, SB_KEY);

  /* ============================================================
     ▼▼▼ 費目（カテゴリ）と絵文字の設定 ▼▼▼
     ・budget は「初期値」。実際の予算は ⚙️ 設定画面で変更できます
     ============================================================ */
  var CATEGORIES = [
    { name: '食費・日用品',   emoji: '🛒', budget: 40000, color: '#ff8fab' },
    { name: '教育費',        emoji: '📚', budget: 10000, color: '#ffc4a3' },
    { name: '外食',          emoji: '🍽️', budget: 15000, color: '#ffd670' },
    { name: 'オシャレ',      emoji: '👗', budget: 10000, color: '#c3a6ff' },
    { name: '交通費',        emoji: '🚃', budget: 5000,  color: '#8fd3c8' },
    { name: '交際費',        emoji: '🍻', budget: 10000, color: '#f5a3c7' },
    { name: '趣味・レジャー', emoji: '🎥', budget: 10000, color: '#a3c9ff' },
    { name: '医療費',        emoji: '💊', budget: 5000,  color: '#b5e0a0' },
    { name: '激ヤバ',        emoji: '💸', budget: 0,     color: '#ff6b6b' }
  ];
  /* ▲▲▲ 設定はここまで ▲▲▲ */

  var now = new Date();
  var y = now.getFullYear(), mo = now.getMonth();
  var data = null;
  // ネットから取ってきたデータを一時的に持っておく箱
  var state = { uid: null, entries: [], budgets: {} };

  function ymStr() { return y + '-' + ('0' + (mo + 1)).slice(-2); }
  function yen(n) { return '¥' + Number(n).toLocaleString(); }
  function esc(s) { return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
  function jstr(s) { return String(s).replace(/\\/g, '\\\\').replace(/'/g, "\\'"); }

  function catDef(name) {
    for (var i = 0; i < CATEGORIES.length; i++) if (CATEGORIES[i].name === name) return CATEGORIES[i];
    return null;
  }
  function emojiFor(name) { var c = catDef(name); return c ? c.emoji : ''; }
  var EXTRA_COLORS = ['#c9b6a0', '#9ad0e0', '#e0b0d0', '#b0c0a0'];
  function colorFor(name, i) {
    var c = catDef(name);
    if (c) return c.color;
    return EXTRA_COLORS[(i || 0) % EXTRA_COLORS.length];
  }
  function label(name) { var e = emojiFor(name); return (e ? e + ' ' : '') + name; }
  function budgetFor(name) {
    if (name in state.budgets) return Number(state.budgets[name]);
    var c = catDef(name);
    return c ? c.budget : 0;
  }

  /* ---- Supabase からデータを取ってくる ---- */
  async function fetchAll() {
    var res = await Promise.all([
      sb.from('entries').select('*'),
      sb.from('budgets').select('*')
    ]);
    if (res[0].error) throw res[0].error;
    if (res[1].error) throw res[1].error;
    state.entries = res[0].data || [];
    state.budgets = {};
    (res[1].data || []).forEach(function (r) { state.budgets[r.category] = r.amount; });
  }
  async function refresh() {
    document.getElementById('app').innerHTML = '<div class="empty">読み込み中…♪</div>';
    try { await fetchAll(); load(); }
    catch (e) { document.getElementById('app').innerHTML = '<div class="empty">読み込みエラー：' + esc(e.message || e) + '</div>'; }
  }

  /* ---- その月の集計データを組み立てる（手元の state から）---- */
  function buildData(ym) {
    var items = state.entries.filter(function (e) { return String(e.date).slice(0, 7) === ym; });
    items.sort(function (a, b) {
      if (a.date !== b.date) return a.date < b.date ? 1 : -1;
      return String(b.created_at || '').localeCompare(String(a.created_at || ''));
    });
    var spentBy = {}, totalSpent = 0;
    items.forEach(function (it) {
      spentBy[it.category] = (spentBy[it.category] || 0) + Number(it.amount);
      totalSpent += Number(it.amount);
    });
    var budgets = CATEGORIES.map(function (c) {
      return { category: c.name, budget: budgetFor(c.name), spent: spentBy[c.name] || 0 };
    });
    Object.keys(spentBy).forEach(function (name) {
      if (!catDef(name)) budgets.push({ category: name, budget: 0, spent: spentBy[name] });
    });
    return {
      totalBudget: CATEGORIES.reduce(function (s, c) { return s + budgetFor(c.name); }, 0),
      totalSpent: totalSpent,
      budgets: budgets,
      categories: CATEGORIES.map(function (c) { return c.name; }),
      items: items
    };
  }

  function moveMonth(d) {
    mo += d;
    if (mo < 0) { mo = 11; y--; }
    if (mo > 11) { mo = 0; y++; }
    load();
  }

  function load() {
    document.getElementById('ymLabel').textContent = y + '年' + (mo + 1) + '月';
    render(buildData(ymStr()));
  }

  function render(d) {
    data = d;
    var remain = d.totalBudget - d.totalSpent;
    var ratio = d.totalBudget > 0 ? d.totalSpent / d.totalBudget : 0;
    var mood = ratio >= 1 ? 'over' : ratio >= 0.8 ? 'warn' : 'ok';

    var html = '<div class="card"><div class="label">今月あと使えるお金</div>';
    html += '<div class="big ' + mood + '">' + (remain < 0 ? '−' + yen(-remain) : yen(remain)) + '</div>';
    html += '<div class="bar ' + mood + '"><div style="width:' + Math.min(ratio * 100, 100) + '%"></div></div>';
    html += '<div class="sub"><span>使った額 ' + yen(d.totalSpent) + '</span><span>予算 ' + yen(d.totalBudget) + '</span></div>';

    var today = new Date();
    if (today.getFullYear() === y && today.getMonth() === mo && remain > 0) {
      var daysLeft = new Date(y, mo + 1, 0).getDate() - today.getDate() + 1;
      html += '<div class="perday">🌷 あと' + daysLeft + '日、1日 ' + yen(Math.floor(remain / daysLeft)) + ' まで使えます</div>';
    }
    if (remain < 0) html += '<div class="perday">😢 予算を ' + yen(-remain) + ' オーバーしています</div>';
    html += '</div>';

    html += donutHtml(d);

    var cats = d.budgets.filter(function (b) { return b.budget > 0 || b.spent > 0; });
    if (cats.length) {
      html += '<div class="card"><h2>カテゴリ別</h2>';
      cats.forEach(function (b) {
        var r = b.budget > 0 ? b.spent / b.budget : (b.spent > 0 ? 1 : 0);
        var col = r >= 1 ? '#ef8080' : r >= 0.8 ? '#f5b971' : '#7fc8a9';
        html += '<div class="cat" onclick="openCatDetail(\'' + jstr(b.category) + '\')">'
          + '<div class="name">' + esc(label(b.category)) + '</div>'
          + '<div class="cbar"><div style="width:' + Math.min(r * 100, 100) + '%;background:' + col + '"></div></div>'
          + '<div class="num">' + yen(b.spent) + (b.budget > 0 ? ' / ' + yen(b.budget) : '') + '</div>'
          + '<div class="chev">❯</div></div>';
      });
      html += '</div>';
    }

    html += '<h2 style="margin-left:6px">明細（' + d.items.length + '件）</h2>';
    if (!d.items.length) html += '<div class="empty">まだ記録がありません。右下の＋から追加してね</div>';
    var lastDay = '';
    d.items.forEach(function (it) {
      if (it.date !== lastDay) {
        lastDay = it.date;
        html += '<div class="day">' + dayLabel(it.date) + '</div>';
      }
      html += itemHtml(it, true);
    });

    document.getElementById('app').innerHTML = html;
    fillCatOptions();
  }

  function itemHtml(it, showCat) {
    return '<div class="item"><div class="info"><div class="shop">' + esc(it.shop) + '</div>'
      + '<div class="meta">' + esc(it.pay) + '</div></div>'
      + (showCat ? catSelect(it) : '')
      + '<div class="amt">' + yen(it.amount) + '</div>'
      + '<button class="del" onclick="del(\'' + it.id + '\')">🗑</button></div>';
  }

  function donutHtml(d) {
    // 使った額が 1円以上の費目だけを、多い順に並べる
    var segs = d.budgets.filter(function (b) { return b.spent > 0; })
      .sort(function (a, b) { return b.spent - a.spent; });
    if (!segs.length) return '';

    var r = 52, cx = 65, cy = 65, C = 2 * Math.PI * r;
    var acc = 0, circles = '', legend = '';
    segs.forEach(function (b, i) {
      var frac = b.spent / d.totalSpent;
      var col = colorFor(b.category, i);
      var len = frac * C;
      // -90度回転して真上（12時）から時計回りに描く
      circles += '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" '
        + 'stroke="' + col + '" stroke-width="20" '
        + 'stroke-dasharray="' + len.toFixed(2) + ' ' + (C - len).toFixed(2) + '" '
        + 'stroke-dashoffset="' + (-acc).toFixed(2) + '" '
        + 'transform="rotate(-90 ' + cx + ' ' + cy + ')"></circle>';
      var pct = Math.round(frac * 100);
      legend += '<div class="legrow" style="cursor:pointer" onclick="openCatDetail(\'' + jstr(b.category) + '\')"><span class="legdot" style="background:' + col + '"></span>'
        + '<span class="legname">' + esc(label(b.category)) + '</span>'
        + '<span class="legpct">' + pct + '%</span>'
        + '<span class="legamt">' + yen(b.spent) + '</span></div>';
      acc += len;
    });

    var svg = '<svg class="donutSvg" viewBox="0 0 130 130">' + circles
      + '<text class="donutCenterSub" x="65" y="60" text-anchor="middle" font-size="9">合計</text>'
      + '<text class="donutCenter" x="65" y="76" text-anchor="middle" font-size="15">' + yen(d.totalSpent) + '</text>'
      + '</svg>';

    return '<div class="card"><h2>今月の内訳</h2><div class="donutWrap">'
      + svg + '<div class="legend">' + legend + '</div></div></div>';
  }

  /* ---- カテゴリ詳細画面（月推移グラフ＋明細）---- */
  var detailCat = null;
  function monthsBack(n) {
    var arr = [];
    for (var i = n - 1; i >= 0; i--) {
      var mm = mo - i, yy = y;
      while (mm < 0) { mm += 12; yy--; }
      arr.push({ mo: mm, ym: yy + '-' + ('0' + (mm + 1)).slice(-2), label: (mm + 1) + '月' });
    }
    return arr;
  }
  function catSpentInYm(cat, ym) {
    var s = 0;
    state.entries.forEach(function (e) {
      if (e.category === cat && String(e.date).slice(0, 7) === ym) s += Number(e.amount);
    });
    return s;
  }
  function barChartSvg(cat) {
    var months = monthsBack(6);
    var vals = months.map(function (m) { return catSpentInYm(cat, m.ym); });
    var maxV = Math.max.apply(null, vals.concat([1]));
    var col = colorFor(cat);
    var W = 340, H = 190, padT = 24, padB = 24, padX = 6;
    var plotH = H - padT - padB, n = months.length;
    var slot = (W - padX * 2) / n, bw = slot * 0.5;
    var s = '<svg class="chartSvg" viewBox="0 0 ' + W + ' ' + H + '">';
    s += '<line x1="' + padX + '" y1="' + (padT + plotH) + '" x2="' + (W - padX) + '" y2="' + (padT + plotH) + '" stroke="#f0dede" stroke-width="1"/>';
    months.forEach(function (m, i) {
      var h = maxV > 0 ? (vals[i] / maxV) * plotH : 0;
      var x = padX + slot * i + (slot - bw) / 2;
      var yb = padT + (plotH - h);
      var cur = (m.ym === ymStr());
      s += '<rect x="' + x.toFixed(1) + '" y="' + yb.toFixed(1) + '" width="' + bw.toFixed(1) + '" height="' + h.toFixed(1)
        + '" rx="4" fill="' + col + '" opacity="' + (cur ? 1 : 0.5) + '"/>';
      if (vals[i] > 0) s += '<text x="' + (x + bw / 2).toFixed(1) + '" y="' + (yb - 5).toFixed(1) + '" text-anchor="middle" font-size="10" fill="#8a7a7a">' + Number(vals[i]).toLocaleString() + '</text>';
      s += '<text x="' + (x + bw / 2).toFixed(1) + '" y="' + (H - 7) + '" text-anchor="middle" font-size="11" fill="' + (cur ? '#c98a9c' : '#b8a5a5') + '"' + (cur ? ' font-weight="700"' : '') + '>' + m.label + '</text>';
    });
    s += '</svg>';
    return s;
  }
  function openCatDetail(cat) {
    detailCat = cat;
    var curYm = ymStr();
    var total = catSpentInYm(cat, curYm);
    document.getElementById('dTtl').textContent = label(cat);
    document.getElementById('dSub').textContent = (mo + 1) + '月　' + yen(total);

    var html = '<div class="card">' + barChartSvg(cat) + '</div>';

    var items = state.entries.filter(function (e) {
      return e.category === cat && String(e.date).slice(0, 7) === curYm;
    });
    items.sort(function (a, b) {
      if (a.date !== b.date) return a.date < b.date ? 1 : -1;
      return String(b.created_at || '').localeCompare(String(a.created_at || ''));
    });

    html += '<h2 style="margin-left:6px">明細（' + items.length + '件）</h2>';
    if (!items.length) {
      html += '<div class="dEmpty">この月の記録はありません</div>';
    } else {
      var lastDay = '', dayTotal = {};
      items.forEach(function (it) { dayTotal[it.date] = (dayTotal[it.date] || 0) + Number(it.amount); });
      items.forEach(function (it) {
        if (it.date !== lastDay) {
          lastDay = it.date;
          html += '<div class="day">' + dayLabel(it.date) + '（' + yen(dayTotal[it.date]) + '）</div>';
        }
        html += itemHtml(it, false);
      });
    }
    document.getElementById('dBody').innerHTML = html;
    document.getElementById('dBody').scrollTop = 0;
    document.getElementById('detail').classList.add('show');
  }
  function closeCatDetail() {
    detailCat = null;
    document.getElementById('detail').classList.remove('show');
  }

  function catSelect(it) {
    var opts = data.categories.slice();
    if (opts.indexOf(it.category) === -1) opts.push(it.category);
    var h = '<select onchange="changeCat(\'' + it.id + '\', this.value)">';
    opts.forEach(function (c) {
      h += '<option value="' + esc(c) + '"' + (c === it.category ? ' selected' : '') + '>' + esc(label(c)) + '</option>';
    });
    return h + '</select>';
  }

  function dayLabel(dateStr) {
    var p = String(dateStr).split('-');
    var d = new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
    var w = ['日', '月', '火', '水', '木', '金', '土'][d.getDay()];
    return Number(p[1]) + '月' + Number(p[2]) + '日（' + w + '）';
  }

  async function changeCat(id, cat) {
    var res = await sb.from('entries').update({ category: cat }).eq('id', id);
    if (res.error) { alert('変更に失敗：' + res.error.message); return; }
    await refresh();
    reopenDetailIfOpen();
  }

  async function del(id) {
    if (!confirm('この記録を削除しますか？')) return;
    var res = await sb.from('entries').delete().eq('id', id);
    if (res.error) { alert('削除に失敗：' + res.error.message); return; }
    await refresh();
    reopenDetailIfOpen();
  }
  function reopenDetailIfOpen() {
    if (detailCat && document.getElementById('detail').classList.contains('show')) openCatDetail(detailCat);
  }

  /* ---- 追加シート ---- */
  function openSheet() {
    var t = new Date();
    document.getElementById('f_date').value = t.getFullYear() + '-' + ('0' + (t.getMonth() + 1)).slice(-2) + '-' + ('0' + t.getDate()).slice(-2);
    document.getElementById('f_amount').value = '';
    document.getElementById('f_shop').value = '';
    document.getElementById('overlay').className = 'overlay show';
    document.getElementById('sheet').style.display = 'block';
  }
  function closeSheet() {
    document.getElementById('overlay').className = 'overlay';
    document.getElementById('sheet').style.display = 'none';
  }
  function fillCatOptions() {
    var sel = document.getElementById('f_cat');
    if (!data || sel.options.length) return;
    data.categories.forEach(function (c) {
      var o = document.createElement('option');
      o.value = c;
      o.textContent = label(c);
      sel.appendChild(o);
    });
  }
  async function save() {
    var amount = Number(document.getElementById('f_amount').value);
    if (!amount || amount <= 0) { alert('金額を入れてください'); return; }
    var btn = document.getElementById('saveBtn');
    btn.disabled = true; btn.textContent = '保存中…';
    var res = await sb.from('entries').insert({
      user_id: state.uid,
      date: document.getElementById('f_date').value,
      amount: amount,
      shop: document.getElementById('f_shop').value || '（無題）',
      category: document.getElementById('f_cat').value,
      pay: document.getElementById('f_pay').value
    });
    btn.disabled = false; btn.textContent = '追加する';
    if (res.error) { alert('保存に失敗：' + res.error.message); return; }
    closeSheet();
    await refresh();
  }

  /* ---- 予算の設定シート ---- */
  function openSettings() {
    var h = '<h3>⚙️ 予算の設定（1ヶ月あたり）</h3><div class="setlist">';
    CATEGORIES.forEach(function (c) {
      var val = (c.name in state.budgets) ? state.budgets[c.name] : c.budget;
      h += '<div class="setrow"><span class="setname">' + esc(label(c.name)) + '</span>'
        + '<input type="number" inputmode="numeric" data-cat="' + esc(c.name) + '" value="' + val + '"></div>';
    });
    h += '</div><div class="settotal" id="setTotal"></div>';
    h += '<button class="primaryBtn" id="setSaveBtn" onclick="saveSettings()">保存する</button>';
    h += '<button class="linkBtn" onclick="openImport()">📥 データをまとめて取り込み</button>';
    h += '<button class="linkBtn" onclick="doLogout()">ログアウト</button>';
    var el = document.getElementById('setSheet');
    el.innerHTML = h;
    updateSetTotal();
    el.querySelectorAll('input[data-cat]').forEach(function (inp) { inp.addEventListener('input', updateSetTotal); });
    document.getElementById('setOverlay').className = 'overlay show';
    el.style.display = 'block';
  }
  function updateSetTotal() {
    var sum = 0;
    document.querySelectorAll('#setSheet input[data-cat]').forEach(function (inp) { sum += Number(inp.value) || 0; });
    document.getElementById('setTotal').textContent = '合計予算：' + yen(sum) + ' / 月';
  }
  async function saveSettings() {
    var rows = [];
    document.querySelectorAll('#setSheet input[data-cat]').forEach(function (inp) {
      rows.push({ user_id: state.uid, category: inp.getAttribute('data-cat'), amount: Number(inp.value) || 0 });
    });
    var btn = document.getElementById('setSaveBtn');
    btn.disabled = true; btn.textContent = '保存中…';
    var res = await sb.from('budgets').upsert(rows, { onConflict: 'user_id,category' });
    btn.disabled = false; btn.textContent = '保存する';
    if (res.error) { alert('保存に失敗：' + res.error.message); return; }
    closeSettings();
    await refresh();
  }
  function closeSettings() {
    document.getElementById('setOverlay').className = 'overlay';
    document.getElementById('setSheet').style.display = 'none';
  }

  /* ---- まとめて取り込みシート ---- */
  function openImport() {
    closeSettings();
    var el = document.getElementById('impSheet');
    el.innerHTML = '<h3>📥 データをまとめて取り込み</h3>'
      + '<div class="field"><label>1行1件・タブ区切り（日付／金額／内容／カテゴリ／支払方法）</label>'
      + '<textarea id="impText" rows="6" placeholder="2026-06-01&#9;500&#9;スーパー&#9;食費・日用品&#9;イオンカード"></textarea></div>'
      + '<div class="settotal" id="impInfo">貼り付けると件数が出ます</div>'
      + '<button class="primaryBtn" id="impBtn" onclick="runImport()">取り込む</button>'
      + '<button class="linkBtn" onclick="closeImport()">とじる</button>';
    document.getElementById('impText').addEventListener('input', updateImpInfo);
    document.getElementById('impOverlay').className = 'overlay show';
    el.style.display = 'block';
  }
  function closeImport() {
    document.getElementById('impOverlay').className = 'overlay';
    document.getElementById('impSheet').style.display = 'none';
  }
  function isRealDate(s) {
    var p = s.split('-'), yy = +p[0], mm = +p[1], dd = +p[2];
    var d = new Date(yy, mm - 1, dd);
    return d.getFullYear() === yy && d.getMonth() === mm - 1 && d.getDate() === dd;
  }
  function parseImport(text) {
    var lines = text.split(/\r?\n/).map(function (l) { return l.replace(/\s+$/, ''); }).filter(function (l) { return l.trim(); });
    var rows = [], errors = [];
    lines.forEach(function (line, i) {
      var p = line.split('\t');
      if (p.length < 5) { errors.push((i + 1) + '行目：列が足りません'); return; }
      var date = p[0].trim(), amount = Number(p[1].trim());
      if (!/^\d{4}-\d{2}-\d{2}$/.test(date) || !isRealDate(date)) { errors.push((i + 1) + '行目：日付が正しくありません（例：2026-06-01）'); return; }
      if (!(amount > 0)) { errors.push((i + 1) + '行目：金額が正しくありません'); return; }
      rows.push({ date: date, amount: Math.round(amount), shop: p[2].trim() || '（無題）', category: p[3].trim(), pay: p[4].trim() || 'その他' });
    });
    return { rows: rows, errors: errors };
  }
  function updateImpInfo() {
    var r = parseImport(document.getElementById('impText').value);
    var msg = '取り込める：' + r.rows.length + '件';
    if (r.errors.length) msg += ' ／ ⚠️スキップ：' + r.errors.length + '件（' + esc(r.errors.slice(0, 2).join('、')) + (r.errors.length > 2 ? ' …' : '') + '）';
    document.getElementById('impInfo').innerHTML = msg;
  }
  async function runImport() {
    var parsed = parseImport(document.getElementById('impText').value);
    if (!parsed.rows.length) { alert('取り込めるデータがありません'); return; }
    var unknown = parsed.rows.filter(function (r) { return !catDef(r.category); });
    var note = unknown.length ? '\n（' + unknown.length + '件は未登録カテゴリですが、そのまま取り込みます）' : '';
    if (!confirm(parsed.rows.length + '件を取り込みます。よろしいですか？' + note)) return;
    var btn = document.getElementById('impBtn');
    btn.disabled = true; btn.textContent = '取り込み中…';
    var payload = parsed.rows.map(function (r) {
      return { user_id: state.uid, date: r.date, amount: r.amount, shop: r.shop, category: r.category, pay: r.pay };
    });
    var res = await sb.from('entries').insert(payload);
    btn.disabled = false; btn.textContent = '取り込む';
    if (res.error) { alert('取り込みに失敗：' + res.error.message); return; }
    closeImport();
    alert(parsed.rows.length + '件を取り込みました🌸');
    await refresh();
  }

  /* ---- ログイン関係 ---- */
  async function initAuth() {
    var res = await sb.auth.getSession();
    if (res.data.session) onSignedIn(res.data.session);
    else document.body.classList.remove('signed-in');
  }
  async function onSignedIn(session) {
    state.uid = session.user.id;
    document.body.classList.add('signed-in');
    await refresh();
  }
  async function doLogin() {
    var email = document.getElementById('l_email').value.trim();
    var pass = document.getElementById('l_pass').value;
    var msg = document.getElementById('l_msg');
    var btn = document.getElementById('loginBtn');
    msg.textContent = '';
    if (!email || !pass) { msg.textContent = 'メールとパスワードを入れてください'; return; }
    btn.disabled = true; btn.textContent = 'ログイン中…';
    var res = await sb.auth.signInWithPassword({ email: email, password: pass });
    btn.disabled = false; btn.textContent = 'ログイン';
    if (res.error) { msg.textContent = 'ログインできませんでした：' + res.error.message; return; }
    onSignedIn(res.data.session);
  }
  async function doLogout() {
    await sb.auth.signOut();
    state = { uid: null, entries: [], budgets: {} };
    closeSettings();
    document.body.classList.remove('signed-in');
  }

  initAuth();
</script>
</body>
</html>
